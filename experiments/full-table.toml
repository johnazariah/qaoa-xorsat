# Experiment specs for all 15 (k,D) pairs from Jordan et al.
# Each job runs p=1 through p_max with warm-starting.
# Memory requirement at depth p: ~p × 2^(2p+1) × 16 bytes (Complex{Float64})
# At p=13: ~28 GB for adjoint cache → needs 64GB VM

[experiments]

# k=3 family
[[experiments.jobs]]
k = 3
D = 4
p_max = 13
clause_sign = 1
restarts = 2
maxiters = 320
seed = 1234
autodiff = "adjoint"
priority = 1  # primary target

[[experiments.jobs]]
k = 3
D = 5
p_max = 13
clause_sign = 1
