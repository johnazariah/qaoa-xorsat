name: Fleet Guardian

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:        # Manual trigger

permissions:
  id-token: write
  contents: read

jobs:
  restart-evicted:
    name: Restart evicted Spot VMs
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check and restart VMs
        run: |
          RG="qaoa-fleet-2"
          NUM_VMS=5
          restarted=0

          for i in $(seq 0 $((NUM_VMS - 1))); do
            VM_NAME="qaoa-vm-$i"
            STATE=$(az vm get-instance-view -g "$RG" -n "$VM_NAME" \
              --query "instanceView.statuses[1].displayStatus" -o tsv 2>/dev/null || echo "not found")

            echo "  $VM_NAME: $STATE"

            if [ "$STATE" = "VM deallocated" ]; then
              echo "  -> Restarting $VM_NAME..."
              az vm start -g "$RG" -n "$VM_NAME" --no-wait
              restarted=$((restarted + 1))
            fi
          done

          if [ "$restarted" -gt 0 ]; then
            echo "::warning::Restarted $restarted evicted VM(s)"
          else
            echo "All VMs running — no action needed"
          fi
