name: Reproduce Published Results

permissions:
  contents: write

# Validates our implementation against Farhi et al. 2025 Table 1 (MaxCut)
# and computes the target (k=3, D=4) results at feasible depths.
#
# This workflow takes ~1 hour on a standard runner (p≤5) or several hours
# on the testbed (p≤8). Use workflow_dispatch to trigger manually.

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner label'
        type: choice
        options:
          - ubuntu-latest
          - testbed-48gb
        default: ubuntu-latest

jobs:
  # Step 1: Reproduce MaxCut (k=2, D=3) to validate against published values
  maxcut-validation:
    name: "MaxCut k=2 D=3 p=1-5 (validation)"
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        if: ${{ inputs.runner == 'ubuntu-latest' }}
        with:
          version: '1'

      - uses: julia-actions/cache@v2
        if: ${{ inputs.runner == 'ubuntu-latest' }}

      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.precompile()'

      - name: Run tests
        run: julia --project=. -e 'using Pkg; Pkg.test()'

      - name: Optimise MaxCut p=1-5
        id: maxcut
        run: |
          mkdir -p results
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          COMMIT=$(git rev-parse --short HEAD)
          BASENAME="${TIMESTAMP}-${COMMIT}-maxcut-k2-D3-p1-5"
          echo "basename=${BASENAME}" >> $GITHUB_OUTPUT
          cat > results/${BASENAME}.meta <<EOF
          code_commit: $(git rev-parse HEAD)
          run_date: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          runner: ${{ inputs.runner }}
          run_kind: reproduce
          params: k=2 D=3 p=1-5 restarts=8 maxiters=100 seed=1234
          machine_artifacts_dir: results/${BASENAME}.machine
          EOF
          RUN_DIR="results/${BASENAME}.machine"
          export BASENAME RUN_DIR
          bash scripts/testbed/run-with-machine-state.sh "$RUN_DIR" -- bash -lc '
            set -euo pipefail
            QAOA_RUN_KIND=reproduce \
            QAOA_RUNNER_LABEL="${{ inputs.runner }}" \
            QAOA_RELIABILITY_DIR="$RUN_DIR" \
            julia --project=. scripts/optimize_qaoa.jl 2 3 1 5 8 100 1234 true \
            | tee results/${BASENAME}.csv
          '

      - name: Analyse MaxCut machine-state reliability
        run: |
          RUN_DIR="results/${{ steps.maxcut.outputs.basename }}.machine"
          bash scripts/testbed/analyze-machine-state.sh "$RUN_DIR" | tee "$RUN_DIR/machine-analysis.json"

      - name: Validate against Farhi 2025 Table 1
        run: |
          julia --project=. -e '
            # Farhi 2025 published values (4 decimal places)
            published = Dict(1 => 0.6924, 2 => 0.7559, 3 => 0.7923, 4 => 0.8168, 5 => 0.8363)
            lines = readlines("results/${{ steps.maxcut.outputs.basename }}.csv")
            all_pass = true
            for line in lines[2:end]  # skip header
                fields = split(line, ",")
                p = parse(Int, fields[1])
                value = parse(Float64, fields[2])
                expected = published[p]
                err = abs(value - expected)
                status = err < 1e-3 ? "PASS" : "FAIL"
                println("p=$p: got $value, expected $expected, err=$err [$status]")
                if err ≥ 1e-3
                    all_pass = false
                end
            end
            all_pass || error("Validation failed — results do not match Farhi 2025 Table 1")
          '

      - name: Commit MaxCut results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --cached --quiet || git commit -m "results: ${{ steps.maxcut.outputs.basename }}"
          git push

  # Step 2: Compute (k=3, D=4) — the target problem
  xorsat-target:
    name: "3-XORSAT k=3 D=4 p=1-5 (target)"
    needs: maxcut-validation
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        if: ${{ inputs.runner == 'ubuntu-latest' }}
        with:
          version: '1'

      - uses: julia-actions/cache@v2
        if: ${{ inputs.runner == 'ubuntu-latest' }}

      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.precompile()'

      - name: Optimise k=3 D=4 p=1-5
        id: xorsat
        run: |
          mkdir -p results
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          COMMIT=$(git rev-parse --short HEAD)
          BASENAME="${TIMESTAMP}-${COMMIT}-xorsat-k3-D4-p1-5"
          echo "basename=${BASENAME}" >> $GITHUB_OUTPUT
          cat > results/${BASENAME}.meta <<EOF
          code_commit: $(git rev-parse HEAD)
          run_date: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          runner: ${{ inputs.runner }}
          run_kind: reproduce
          params: k=3 D=4 p=1-5 restarts=8 maxiters=100 seed=1234
          machine_artifacts_dir: results/${BASENAME}.machine
          EOF
          RUN_DIR="results/${BASENAME}.machine"
          export BASENAME RUN_DIR
          bash scripts/testbed/run-with-machine-state.sh "$RUN_DIR" -- bash -lc '
            set -euo pipefail
            QAOA_RUN_KIND=reproduce \
            QAOA_RUNNER_LABEL="${{ inputs.runner }}" \
            QAOA_RELIABILITY_DIR="$RUN_DIR" \
            julia --project=. scripts/optimize_qaoa.jl 3 4 1 5 8 100 1234 true \
            | tee results/${BASENAME}.csv
          '

      - name: Analyse XORSAT machine-state reliability
        run: |
          RUN_DIR="results/${{ steps.xorsat.outputs.basename }}.machine"
          bash scripts/testbed/analyze-machine-state.sh "$RUN_DIR" | tee "$RUN_DIR/machine-analysis.json"

      - name: Summary
        run: |
          echo "## QAOA Results for (k=3, D=4)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| p | Satisfaction fraction |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---------------------|" >> $GITHUB_STEP_SUMMARY
          tail -n +2 results/${{ steps.xorsat.outputs.basename }}.csv | while IFS=, read -r p value rest; do
            echo "| $p | $value |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "SA target: 0.9366" >> $GITHUB_STEP_SUMMARY

      - name: Commit XORSAT results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add results/
          git diff --cached --quiet || git commit -m "results: ${{ steps.xorsat.outputs.basename }}"
          git push
