name: QAOA Optimisation

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      k:
        description: 'Constraint arity k'
        type: number
        default: 3
      D:
        description: 'Variable degree D'
        type: number
        default: 4
      p_min:
        description: 'Minimum QAOA depth'
        type: number
        default: 1
      p_max:
        description: 'Maximum QAOA depth'
        type: number
        default: 5
      restarts:
        description: 'L-BFGS restarts per depth'
        type: number
        default: 8
      maxiters:
        description: 'Max iterations per restart'
        type: number
        default: 100
      seed:
        description: 'Random seed for reproducibility'
        type: number
        default: 1234
      runner:
        description: 'Runner label (ubuntu-latest or testbed-48gb)'
        type: choice
        options:
          - ubuntu-latest
          - testbed-48gb
        default: ubuntu-latest

jobs:
  optimize:
    name: "k=${{ inputs.k }} D=${{ inputs.D }} p=${{ inputs.p_min }}-${{ inputs.p_max }}"
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 1440  # 24 hours max

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        if: ${{ inputs.runner == 'ubuntu-latest' }}
        with:
          version: '1'

      - uses: julia-actions/cache@v2
        if: ${{ inputs.runner == 'ubuntu-latest' }}

      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.precompile()'

      - name: Run tests first
        run: julia --project=. -e 'using Pkg; Pkg.test()'

      - name: Create results directory and set filename
        id: meta
        run: |
          mkdir -p results
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          COMMIT=$(git rev-parse --short HEAD)
          EXPERIMENT="optimize-k${{ inputs.k }}-D${{ inputs.D }}-p${{ inputs.p_min }}-${{ inputs.p_max }}"
          BASENAME="${TIMESTAMP}-${COMMIT}-${EXPERIMENT}"
          echo "basename=${BASENAME}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Record metadata
        run: |
          cat > results/${{ steps.meta.outputs.basename }}.meta <<EOF
          code_commit: $(git rev-parse HEAD)
          run_date: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          runner: ${{ inputs.runner }}
          run_kind: experiment
          params: k=${{ inputs.k }} D=${{ inputs.D }} p=${{ inputs.p_min }}-${{ inputs.p_max }} restarts=${{ inputs.restarts }} maxiters=${{ inputs.maxiters }} seed=${{ inputs.seed }}
          machine_artifacts_dir: results/${{ steps.meta.outputs.basename }}.machine
          EOF

      - name: Optimise with machine-state capture
        run: |
          RUN_DIR="results/${{ steps.meta.outputs.basename }}.machine"
          export RUN_DIR
          bash scripts/testbed/run-with-machine-state.sh "$RUN_DIR" -- bash -lc '
            set -euo pipefail
            QAOA_RUN_KIND=experiment \
            QAOA_RUNNER_LABEL="${{ inputs.runner }}" \
            QAOA_RELIABILITY_DIR="$RUN_DIR" \
            julia --project=. scripts/optimize_qaoa.jl \
              ${{ inputs.k }} ${{ inputs.D }} \
              ${{ inputs.p_min }} ${{ inputs.p_max }} \
              ${{ inputs.restarts }} ${{ inputs.maxiters }} \
              ${{ inputs.seed }} true \
            | tee results/${{ steps.meta.outputs.basename }}.csv
          '

      - name: Analyse machine-state reliability
        run: |
          RUN_DIR="results/${{ steps.meta.outputs.basename }}.machine"
          bash scripts/testbed/analyze-machine-state.sh "$RUN_DIR" | tee "$RUN_DIR/machine-analysis.json"

      - name: Show results
        run: cat results/${{ steps.meta.outputs.basename }}.csv

      - name: Commit results to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --cached --quiet || git commit -m "results: ${{ steps.meta.outputs.basename }}"
          git push
